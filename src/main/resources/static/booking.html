<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Booking - Cab Booking System</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- English comment: Trip booking page - full trip lifecycle operations -->
</head>
<body>
<div class="container">
    <h1>Trip Booking Operations</h1>
    <a href="index.html" class="btn btn-secondary">Back to Main Menu</a>

    <!-- Create Booking Section -->
    <div class="section">
        <h2>1. Create Trip Booking</h2>
        <div class="form-group">
            <label for="bookingCustomerId">Customer Profile ID</label>
            <input type="text" id="bookingCustomerId" required placeholder="customer-id-123">
        </div>
        <div class="form-group">
            <label for="pickupLocation">Pickup Location</label>
            <input type="text" id="pickupLocation" required placeholder="Central Park, NY">
        </div>
        <div class="form-group">
            <label for="dropoffLocation">Dropoff Location</label>
            <input type="text" id="dropoffLocation" required placeholder="Times Square, NY">
        </div>
        <div class="form-group">
            <label for="baseFare">Base Fare ($)</label>
            <input type="number" id="baseFare" min="0" step="0.01" value="5.00" required>
        </div>
        <button class="btn" onclick="createBooking()">Create Booking</button>
        <div id="bookingResponse" class="response"></div>
    </div>

    <!-- Assign Driver Section -->
    <div class="section">
        <h2>2. Assign Driver & Cab to Booking</h2>
        <div class="form-group">
            <label for="assignBookingId">Booking ID</label>
            <input type="text" id="assignBookingId" required placeholder="booking-id-123">
        </div>
        <div class="form-group">
            <label for="assignDriverId">Driver Profile ID</label>
            <input type="text" id="assignDriverId" required placeholder="driver-id-123">
        </div>
        <div class="form-group">
            <label for="assignCabId">Cab ID</label>
            <input type="text" id="assignCabId" required placeholder="cab-id-123">
        </div>
        <button class="btn" onclick="assignDriverToBooking()">Assign Driver & Cab</button>
        <div id="assignResponse" class="response"></div>
    </div>

    <!-- Start Trip Section -->
    <div class="section">
        <h2>3. Start Trip</h2>
        <div class="form-group">
            <label for="startBookingId">Booking ID</label>
            <input type="text" id="startBookingId" required placeholder="booking-id-123">
        </div>
        <button class="btn" onclick="startTrip()">Start Trip</button>
        <div id="startResponse" class="response"></div>
    </div>

    <!-- Complete Trip Section -->
    <div class="section">
        <h2>4. Complete Trip</h2>
        <div class="form-group">
            <label for="completeBookingId">Booking ID</label>
            <input type="text" id="completeBookingId" required placeholder="booking-id-123">
        </div>
        <div class="form-group">
            <label for="distanceKm">Distance (KM)</label>
            <input type="number" id="distanceKm" min="0" step="0.1" value="5.0" required>
        </div>
        <button class="btn" onclick="completeTrip()">Complete Trip</button>
        <div id="completeResponse" class="response"></div>
    </div>

    <!-- Payment Section -->
    <div class="section">
        <h2>5. Make Payment</h2>
        <div class="form-group">
            <label for="paymentBookingId">Booking ID</label>
            <input type="text" id="paymentBookingId" required placeholder="booking-id-123">
        </div>
        <div class="form-group">
            <label for="paymentAmount">Amount ($)</label>
            <input type="number" id="paymentAmount" min="0" step="0.01" required>
        </div>
        <div class="form-group">
            <label for="paymentMethod">Payment Method</label>
            <select id="paymentMethod" required>
                <option value="CREDIT_CARD">Credit Card</option>
                <option value="DEBIT_CARD">Debit Card</option>
                <option value="UPI">UPI</option>
                <option value="CASH">Cash</option>
            </select>
        </div>
        <button class="btn" onclick="createTripPayment()">Make Payment</button>
        <div id="paymentResponse" class="response"></div>
    </div>

    <!-- Review Section -->
    <div class="section">
        <h2>6. Leave Review</h2>
        <div class="form-group">
            <label for="reviewBookingId">Booking ID</label>
            <input type="text" id="reviewBookingId" required placeholder="booking-id-123">
        </div>
        <div class="form-group">
            <label for="reviewRating">Rating (1-5)</label>
            <input type="number" id="reviewRating" min="1" max="5" step="1" value="5" required>
        </div>
        <div class="form-group">
            <label for="reviewComments">Comments</label>
            <textarea id="reviewComments" placeholder="Great ride!"></textarea>
        </div>
        <button class="btn" onclick="createTripReview()">Leave Review</button>
        <div id="reviewResponse" class="response"></div>
    </div>
</div>

<script src="js/axios.min.js"></script>
<script src="js/api.js"></script>
<script src="js/booking.js"></script>
</body>
</html>
