<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Operations - Cab Booking System</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- English comment: Customer operations page - create user and customer profile -->
</head>
<body>
<div class="container">
    <h1>Customer Operations</h1>
    <a href="index.html" class="btn btn-secondary">Back to Main Menu</a>

    <!-- Create User Section -->
    <div class="section">
        <h2>1. Create Customer User</h2>
        <div class="form-group">
            <label for="userEmail">Email</label>
            <input type="email" id="userEmail" required placeholder="customer@example.com">
        </div>
        <div class="form-group">
            <label for="userPassword">Password</label>
            <input type="password" id="userPassword" required placeholder="password123">
        </div>
        <div class="form-group">
            <label for="userMobile">Mobile Number</label>
            <input type="text" id="userMobile" required placeholder="+1234567890">
        </div>
        <button class="btn" onclick="createCustomerUser()">Create User</button>
        <div id="userResponse" class="response"></div>
    </div>

    <!-- Create Customer Profile Section -->
    <div class="section">
        <h2>2. Create Customer Profile</h2>
        <div class="form-group">
            <label for="profileUserId">User ID (from create user response)</label>
            <input type="text" id="profileUserId" required placeholder="user-id-123">
        </div>
        <div class="form-group">
            <label for="profileAddress">Address</label>
            <input type="text" id="profileAddress" required placeholder="123 Main St, City">
        </div>
        <div class="form-group">
            <label for="profileRating">Initial Rating (0-5)</label>
            <input type="number" id="profileRating" min="0" max="5" step="0.1" value="5.0">
        </div>
        <button class="btn" onclick="createCustomerProfile()">Create Profile</button>
        <div id="profileResponse" class="response"></div>
    </div>
</div>

<script src="js/axios.min.js"></script>
<script src="js/api.js"></script>
<script src="js/customer.js"></script>
</body>
</html>
