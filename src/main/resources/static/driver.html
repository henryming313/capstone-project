<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Operations - Cab Booking System</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- English comment: Driver operations page - create driver user/profile and update status -->
</head>
<body>
<div class="container">
    <h1>Driver Operations</h1>
    <a href="index.html" class="btn btn-secondary">Back to Main Menu</a>

    <!-- Create Driver User Section -->
    <div class="section">
        <h2>1. Create Driver User</h2>
        <div class="form-group">
            <label for="driverEmail">Email</label>
            <input type="email" id="driverEmail" required placeholder="driver@example.com">
        </div>
        <div class="form-group">
            <label for="driverPassword">Password</label>
            <input type="password" id="driverPassword" required placeholder="password123">
        </div>
        <div class="form-group">
            <label for="driverMobile">Mobile Number</label>
            <input type="text" id="driverMobile" required placeholder="+1234567890">
        </div>
        <button class="btn" onclick="createDriverUser()">Create User</button>
        <div id="driverUserResponse" class="response"></div>
    </div>

    <!-- Create Driver Profile Section -->
    <div class="section">
        <h2>2. Create Driver Profile</h2>
        <div class="form-group">
            <label for="driverProfileUserId">User ID (from create user response)</label>
            <input type="text" id="driverProfileUserId" required placeholder="user-id-123">
        </div>
        <div class="form-group">
            <label for="licenseNumber">License Number</label>
            <input type="text" id="licenseNumber" required placeholder="LIC123456">
        </div>
        <div class="form-group">
            <label for="driverRating">Initial Rating (0-5)</label>
            <input type="number" id="driverRating" min="0" max="5" step="0.1" value="5.0">
        </div>
        <div class="form-group">
            <label for="currentLocation">Current Location</label>
            <input type="text" id="currentLocation" placeholder="Central Park, NY">
        </div>
        <button class="btn" onclick="createDriverProfile()">Create Profile</button>
        <div id="driverProfileResponse" class="response"></div>
    </div>

    <!-- Update Driver Status Section -->
    <div class="section">
        <h2>3. Update Driver Status (Online/Offline)</h2>
        <div class="form-group">
            <label for="driverId">Driver Profile ID</label>
            <input type="text" id="driverId" required placeholder="driver-id-123">
        </div>
        <div class="form-group">
            <label for="driverStatus">Status</label>
            <select id="driverStatus" required>
                <option value="ONLINE">ONLINE</option>
                <option value="OFFLINE">OFFLINE</option>
                <option value="ON_TRIP">ON_TRIP</option>
            </select>
        </div>
        <div class="form-group">
            <label for="statusLocation">Current Location (optional)</label>
            <input type="text" id="statusLocation" placeholder="Central Park, NY">
        </div>
        <button class="btn" onclick="updateDriverStatus()">Update Status</button>
        <div id="statusResponse" class="response"></div>
    </div>
</div>

<script src="js/axios.min.js"></script>
<script src="js/api.js"></script>
<script src="js/driver.js"></script>
</body>
</html>
