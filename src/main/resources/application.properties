spring.application.name=cabbooking-capstone-project

# Server Configuration
server.port=8081



spring.datasource.url=jdbc:mysql://172.17.153.176:3306/cabbooking_mvp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=Root@1234


# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Logging Configuration
logging.level.org.springframework.web=INFO
logging.level.com.centria.cabbooking=DEBUG
logging.level.org.hibernate=ERROR
